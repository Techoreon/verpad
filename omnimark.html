<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Startpage</title>
    <style>
        /* Pure CSS - No external dependencies required */
        :root {
            --bg: #0a0a0a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-hover: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(59, 130, 246, 0.2); }
        .orb-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: rgba(139, 92, 246, 0.2); animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 10%) scale(1.1); }
        }

        main {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        header { text-align: center; margin-bottom: 3rem; user-select: none; }
        #greeting { font-size: 1.2rem; font-weight: 300; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
        #clock { font-size: 6rem; font-weight: 700; letter-spacing: -2px; text-shadow: 0 10px 30px rgba(0,0,0,0.5); line-height: 1; }
        #date { font-size: 1rem; color: var(--text-muted); margin-top: 1rem; font-weight: 500; }

        /* Search */
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            margin-bottom: 4rem;
        }
        .search-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            fill: var(--text-muted);
            transition: fill 0.3s;
            pointer-events: none;
        }
        .search-input:focus ~ .search-icon { fill: var(--accent); }
        
        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 1.2rem 1.2rem 1.2rem 3.5rem;
            font-size: 1.1rem;
            color: var(--text-main);
            backdrop-filter: blur(10px);
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .search-input::placeholder { color: rgba(255,255,255,0.3); }
        .search-input:focus {
            background: var(--surface-hover);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2), 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Bookmarks Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-height: 40vh;
            overflow-y: auto;
            padding: 1rem;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s;
            backdrop-filter: blur(10px);
            position: relative;
            cursor: pointer;
            aspect-ratio: 1;
        }
        .card:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .card-icon {
            width: 36px;
            height: 36px;
            margin-bottom: 0.8rem;
            transition: transform 0.2s;
        }
        .card:hover .card-icon { transform: scale(1.1); }
        
        .card-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.2s;
        }
        .card:hover .card-title { color: var(--text-main); }

        .btn-delete {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card:hover .btn-delete { opacity: 1; transform: scale(1); }
        .btn-delete:hover { background: #dc2626; }

        .card-add {
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed var(--border);
        }
        .card-add:hover {
            border-color: var(--text-muted);
            background: var(--surface);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal {
            background: #121212;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            border-radius: 1.5rem;
            padding: 2rem;
            transform: scale(0.95) translateY(10px);
            transition: all 0.3s;
            position: relative;
        }
        .modal-overlay.active .modal { transform: scale(1) translateY(0); }
        
        .modal h3 { font-size: 1.5rem; margin-bottom: 1.5rem; font-weight: 600; }
        .modal-close {
            position: absolute;
            top: 1.5rem; right: 1.5rem;
            background: none; border: none; cursor: pointer;
            fill: var(--text-muted); width: 24px; height: 24px;
        }
        .modal-close:hover { fill: var(--text-main); }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; letter-spacing: 1px; font-weight: 600;}
        .form-group input {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: 0.8rem; padding: 0.8rem 1rem; color: var(--text-main); font-size: 1rem; outline: none; transition: border 0.2s;
        }
        .form-group input:focus { border-color: var(--accent); background: var(--surface-hover); }
        
        .btn-submit {
            width: 100%; background: var(--accent); color: white; border: none;
            padding: 1rem; border-radius: 0.8rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 1rem;
        }
        .btn-submit:hover { background: var(--accent-hover); }

        @media (max-width: 600px) {
            #clock { font-size: 4rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main>
        <!-- Header: Greeting & Clock -->
        <header>
            <h2 id="greeting">Good Day</h2>
            <h1 id="clock">00:00</h1>
            <p id="date">Loading...</p>
        </header>

        <!-- Google Search Form -->
        <form action="https://google.com/search" method="GET" class="search-container">
            <input type="text" name="q" id="search-input" class="search-input" placeholder="Search the web..." autocomplete="off" autofocus>
            <!-- Search Icon SVG -->
            <svg class="search-icon" viewBox="0 0 24 24">
                <path d="M10 2a8 8 0 105.293 13.88l4.414 4.413a1 1 0 001.414-1.414l-4.414-4.414A8 8 0 0010 2zm0 2a6 6 0 110 12 6 6 0 010-12z"/>
            </svg>
        </form>

        <!-- Bookmarks Grid -->
        <div id="bookmarks-grid" class="grid">
            <!-- Bookmarks injected via JS -->
        </div>
    </main>

    <!-- Add Bookmark Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <button onclick="closeModal()" class="modal-close">
                <svg viewBox="0 0 24 24"><path d="M18.3 5.71a.996.996 0 00-1.41 0L12 10.59 7.11 5.7A.996.996 0 105.7 7.11L10.59 12 5.7 16.89a.996.996 0 101.41 1.41L12 13.41l4.89 4.89a.996.996 0 101.41-1.41L13.41 12l4.89-4.89c.38-.38.38-1.02 0-1.4z"/></svg>
            </button>
            <h3>Add Bookmark</h3>
            <form id="add-bookmark-form">
                <div class="form-group">
                    <label>Website Name</label>
                    <input type="text" id="bm-title" required placeholder="e.g., GitHub">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="bm-url" required placeholder="https://github.com">
                </div>
                <button type="submit" class="btn-submit">Save Bookmark</button>
            </form>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // --- 1. Clock & Date Logic ---
        function updateTime() {
            const now = new Date();
            
            // Format Time
            const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: false };
            document.getElementById('clock').textContent = now.toLocaleTimeString([], timeOptions);
            
            // Format Date
            const dateOptions = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString(undefined, dateOptions);

            // Determine Greeting
            const hour = now.getHours();
            let greeting = 'Good Evening';
            if (hour >= 5 && hour < 12) greeting = 'Good Morning';
            else if (hour >= 12 && hour < 18) greeting = 'Good Afternoon';
            document.getElementById('greeting').textContent = greeting;
        }
        
        setInterval(updateTime, 1000);
        updateTime();

        // --- 2. Offline SVG Icon Generator ---
        // Generates a beautiful initial-based icon if the internet is down
        function getInitialsSVG(name) {
            const letter = name.charAt(0).toUpperCase();
            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" class="card-icon">
                <rect width="100" height="100" rx="20" fill="rgba(255,255,255,0.1)"/>
                <text x="50" y="50" font-size="45" fill="#ffffff" font-family="sans-serif" font-weight="bold" text-anchor="middle" alignment-baseline="central" dy=".1em">${letter}</text>
            </svg>`;
        }

        // --- 3. Bookmark State Management ---
        const defaultBookmarks =[
            { id: '1', title: 'GitHub', url: 'https://github.com' },
            { id: '2', title: 'YouTube', url: 'https://youtube.com' },
            { id: '3', title: 'Reddit', url: 'https://reddit.com' }
        ];

        let bookmarks = JSON.parse(localStorage.getItem('offline_bookmarks')) || defaultBookmarks;

        function saveBookmarks() {
            localStorage.setItem('offline_bookmarks', JSON.stringify(bookmarks));
        }

        // --- 4. Rendering Logic ---
        function renderBookmarks() {
            const grid = document.getElementById('bookmarks-grid');
            grid.innerHTML = '';

            bookmarks.forEach(bm => {
                // Generate SVG icon from the first letter
                const iconHTML = getInitialsSVG(bm.title);

                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <a href="${bm.url}" style="display:flex; flex-direction:column; align-items:center; text-decoration:none; width:100%;">
                        ${iconHTML}
                        <span class="card-title">${bm.title}</span>
                    </a>
                    <button onclick="deleteBookmark('${bm.id}')" class="btn-delete" title="Remove">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                `;
                grid.appendChild(card);
            });

            // "Add New" Button
            const addBtn = document.createElement('div');
            addBtn.onclick = openModal;
            addBtn.className = "card card-add";
            addBtn.innerHTML = `
                <svg class="card-icon" viewBox="0 0 24 24" fill="var(--text-muted)">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                </svg>
                <span class="card-title">Add Link</span>
            `;
            grid.appendChild(addBtn);
        }

        function deleteBookmark(id) {
            bookmarks = bookmarks.filter(bm => bm.id !== id);
            saveBookmarks();
            renderBookmarks();
        }

        // --- 5. Modal Logic ---
        const modal = document.getElementById('modal');
        const form = document.getElementById('add-bookmark-form');
        const searchInput = document.getElementById('search-input');

        function openModal() {
            modal.classList.add('active');
            document.getElementById('bm-title').focus();
        }

        function closeModal() {
            modal.classList.remove('active');
            form.reset();
            searchInput.focus();
        }

        // Close modal on outside click or Escape key
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Form Submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('bm-title').value;
            let url = document.getElementById('bm-url').value;

            // Ensure URL has protocol
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            const newBookmark = {
                id: Date.now().toString(),
                title,
                url
            };

            bookmarks.push(newBookmark);
            saveBookmarks();
            renderBookmarks();
            closeModal();
        });

        // Initial Render
        renderBookmarks();

        // Gain focus on load
        window.onload = () => searchInput.focus();
    </script>
</body>
</html>
