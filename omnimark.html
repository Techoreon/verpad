<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniMark Ultimate | WYSIWYG Studio</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Vditor (Advanced WYSIWYG Markdown Editor) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css" />
    <script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- CryptoJS for File Encryption -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <style>
        /* Robust Theme System using CSS Variables */
        :root[data-theme="dark"] {
            --bg-app: #0f172a; --bg-panel: #1e293b; --bg-hover: #334155;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #6366f1; --accent-hover: #4f46e5;
            --border-color: #334155;
        }
        :root[data-theme="light"] {
            --bg-app: #f1f5f9; --bg-panel: #ffffff; --bg-hover: #e2e8f0;
            --text-main: #0f172a; --text-muted: #64748b;
            --accent: #3b82f6; --accent-hover: #2563eb;
            --border-color: #cbd5e1;
        }
        :root[data-theme="matrix"] {
            --bg-app: #050505; --bg-panel: #0a0a0a; --bg-hover: #112211;
            --text-main: #00ff41; --text-muted: #008f11;
            --accent: #00ff41; --accent-hover: #00cc33;
            --border-color: #004400;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .theme-panel { background-color: var(--bg-panel); border-color: var(--border-color); }
        .theme-hover:hover { background-color: var(--bg-hover); }
        .theme-text-muted { color: var(--text-muted); }
        .theme-border { border-color: var(--border-color); }
        .theme-accent { background-color: var(--accent); color: #fff; }
        .theme-accent:hover { background-color: var(--accent-hover); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Vditor Overrides for seamless integration */
        .vditor { border: none !important; border-radius: 0 !important; background-color: transparent !important; }
        .vditor-toolbar { border-bottom: 1px solid var(--border-color) !important; background-color: var(--bg-panel) !important; padding-left: 1rem !important;}
        
        /* Command Palette Animation */
        #cmd-palette, #pwd-modal { display: none; }
        #cmd-palette.active, #pwd-modal.active { display: flex; animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .cmd-item.selected { background-color: var(--accent); color: white !important; }

        /* Focus Mode */
        body.focus-mode #sidebar { display: none !important; }
        body.focus-mode #app-header { display: none !important; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <!-- Top Navbar -->
    <header id="app-header" class="h-14 theme-panel border-b theme-border flex items-center justify-between px-4 shrink-0 z-20 shadow-sm transition-all">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2 theme-hover rounded-lg transition" title="Toggle Sidebar">
                <i data-lucide="panel-left" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2 font-bold text-lg tracking-wider" style="color: var(--accent)">
                <i data-lucide="hexagon"></i> OmniMark
            </div>
            <div class="h-6 w-px theme-border border-l mx-2"></div>
            
            <div class="flex items-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4 theme-text-muted"></i>
                <input type="text" id="doc-title" value="Untitled Document" class="bg-transparent border-none outline-none font-semibold px-2 py-1 rounded theme-hover transition w-64" placeholder="Document Title...">
                <i id="lock-indicator" data-lucide="lock" class="w-4 h-4 text-rose-500 hidden" title="Encrypted File"></i>
            </div>
        </div>
        
        <div class="flex items-center gap-1">
            <span id="save-status" class="text-xs theme-text-muted mr-4 flex items-center gap-1">
                <i data-lucide="check" class="w-3 h-3 text-emerald-500"></i> Saved
            </span>
            <button onclick="toggleDictation()" id="btn-dictate" class="p-2 theme-hover rounded-lg transition text-rose-400" title="Voice Dictation">
                <i data-lucide="mic" class="w-5 h-5"></i>
            </button>
            <button onclick="readAloud()" class="p-2 theme-hover rounded-lg transition" title="Read Aloud">
                <i data-lucide="volume-2" class="w-5 h-5"></i>
            </button>
            <button onclick="lockCurrentFile()" class="p-2 theme-hover rounded-lg transition text-amber-500" title="Encrypt & Lock File">
                <i data-lucide="shield" class="w-5 h-5"></i>
            </button>
            <button onclick="openCmd()" class="ml-2 px-3 py-1.5 theme-accent rounded-lg transition text-sm flex items-center gap-2 font-medium shadow-md">
                <i data-lucide="terminal" class="w-4 h-4"></i> Cmd (Ctrl+K)
            </button>
        </div>
    </header>

    <!-- Main App Area -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Sidebar -->
        <aside id="sidebar" class="w-72 theme-panel border-r theme-border flex flex-col shrink-0 transition-all duration-300 z-10 relative">
            
            <div class="p-3 border-b theme-border flex gap-2">
                <button onclick="createNewFile()" class="flex-1 theme-accent py-2 rounded-lg text-sm font-semibold transition shadow-md flex items-center justify-center gap-1">
                    <i data-lucide="plus" class="w-4 h-4"></i> New Note
                </button>
            </div>

            <!-- File Explorer -->
            <div class="flex-1 overflow-y-auto p-2 flex flex-col gap-1" id="file-list">
                <!-- Files injected via JS -->
            </div>

            <!-- Document Insights -->
            <div class="h-1/3 border-t theme-border flex flex-col bg-black/5">
                <div class="p-3 text-xs font-bold uppercase tracking-wider theme-text-muted flex items-center gap-2 border-b theme-border">
                    <i data-lucide="activity" class="w-4 h-4"></i> Insights
                </div>
                <div class="p-4 text-sm flex flex-col gap-3 overflow-y-auto">
                    <div class="flex justify-between items-center">
                        <span class="theme-text-muted">Words</span>
                        <span id="stat-words" class="font-mono font-bold">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="theme-text-muted">Characters</span>
                        <span id="stat-chars" class="font-mono font-bold">0</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="theme-text-muted">Read Time</span>
                        <span id="stat-time" class="font-mono font-bold" style="color: var(--accent)">0 min</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Vditor Editor Area -->
        <div id="editor-wrapper" class="flex-1 flex flex-col relative bg-[var(--bg-app)]">
            <!-- Vditor Native Div -->
            <div id="vditor" class="w-full h-full"></div>
            
            <!-- Dictation Overlay -->
            <div id="dictation-overlay" class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-rose-500 text-white px-4 py-2 rounded-full shadow-lg font-medium text-sm flex items-center gap-2 hidden z-50 animate-pulse">
                <i data-lucide="mic" class="w-4 h-4"></i> Listening... Speak now.
            </div>
        </div>
    </div>

    <!-- Command Palette Modal -->
    <div id="cmd-palette" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center">
        <div class="theme-panel w-full max-w-lg rounded-xl shadow-2xl border theme-border overflow-hidden flex flex-col">
            <div class="p-4 border-b theme-border flex items-center gap-3">
                <i data-lucide="search" class="w-5 h-5 theme-text-muted"></i>
                <input type="text" id="cmd-input" class="w-full bg-transparent border-none outline-none text-lg placeholder-gray-500" placeholder="Type a command...">
            </div>
            <div id="cmd-list" class="max-h-72 overflow-y-auto py-2">
                <!-- Commands injected via JS -->
            </div>
        </div>
    </div>

    <!-- Password Prompt Modal -->
    <div id="pwd-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 items-center justify-center">
        <div class="theme-panel w-full max-w-sm rounded-xl shadow-2xl border theme-border p-6 flex flex-col items-center text-center">
            <div class="w-12 h-12 rounded-full bg-rose-500/20 flex items-center justify-center mb-4 text-rose-500">
                <i data-lucide="lock" class="w-6 h-6"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">Encrypted Document</h3>
            <p class="text-sm theme-text-muted mb-6">Enter password to decrypt or lock this file.</p>
            <input type="password" id="pwd-input" class="w-full bg-[var(--bg-app)] border theme-border rounded-lg px-4 py-2 outline-none focus:border-[var(--accent)] transition mb-4 text-center tracking-widest" placeholder="••••••••">
            <div class="flex gap-3 w-full">
                <button onclick="closePwdModal()" class="flex-1 py-2 rounded-lg border theme-border theme-hover transition font-medium">Cancel</button>
                <button onclick="submitPassword()" class="flex-1 py-2 rounded-lg theme-accent transition font-medium">Confirm</button>
            </div>
            <p id="pwd-error" class="text-rose-500 text-xs mt-3 hidden">Incorrect password!</p>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        // --- Core State ---
        let vditor = null;
        let files = JSON.parse(localStorage.getItem('omni_files_v3')) || {};
        let currentFileId = null;
        let currentSessionPassword = null;
        let isDictating = false;
        let recognition = null;
        
        // --- DOM Elements ---
        const DOM = {
            docTitle: document.getElementById('doc-title'),
            fileList: document.getElementById('file-list'),
            saveStatus: document.getElementById('save-status'),
            lockIndicator: document.getElementById('lock-indicator'),
            cmdPalette: document.getElementById('cmd-palette'),
            cmdInput: document.getElementById('cmd-input'),
            cmdList: document.getElementById('cmd-list'),
            pwdModal: document.getElementById('pwd-modal'),
            pwdInput: document.getElementById('pwd-input'),
            pwdError: document.getElementById('pwd-error'),
            statWords: document.getElementById('stat-words'),
            statChars: document.getElementById('stat-chars'),
            statTime: document.getElementById('stat-time'),
            dictateOverlay: document.getElementById('dictation-overlay')
        };

        // --- Initialize Vditor (WYSIWYG Engine) ---
        function initEditor() {
            const currentTheme = localStorage.getItem('omnimark_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);

            vditor = new Vditor('vditor', {
                height: '100%',
                mode: 'wysiwyg', // Pure WYSIWYG mode natively
                icon: 'material',
                theme: currentTheme === 'light' ? 'classic' : 'dark',
                outline: { enable: true, position: 'right' },
                cache: { enable: false }, // We handle saving to support encryption
                toolbar:[
                    'emoji', 'headings', 'bold', 'italic', 'strike', 'link', '|',
                    'list', 'ordered-list', 'check', 'outdent', 'indent', '|',
                    'quote', 'line', 'code', 'inline-code', '|',
                    'table', 'upload', '|',
                    'undo', 'redo', '|',
                    'edit-mode', // Let user toggle between WYSIWYG, Instant Rendering, and Split View
                    {
                        name: 'more',
                        toolbar: ['export', 'fullscreen', 'info', 'help'],
                    }
                ],
                preview: {
                    theme: { current: currentTheme === 'light' ? 'light' : 'dark' },
                    math: { engine: 'KaTeX' } // Native Math Support
                },
                after: () => {
                    lucide.createIcons();
                    bootFileSystem();
                },
                input: (val) => {
                    triggerAutoSave();
                    updateInsights();
                }
            });
        }

        // --- Robust Theme Manager ---
        function setTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('omnimark_theme', themeName);
            
            if(vditor) {
                const isLight = themeName === 'light';
                // Sync Vditor's UI, Content, and Code Block themes dynamically
                vditor.setTheme(
                    isLight ? 'classic' : 'dark', 
                    isLight ? 'light' : 'dark', 
                    isLight ? 'github' : 'monokai'
                );
            }
        }

        // --- Cryptography (AES-256) ---
        function encrypt(text, password) {
            return CryptoJS.AES.encrypt(text, password).toString();
        }
        function decrypt(ciphertext, password) {
            try {
                const bytes = CryptoJS.AES.decrypt(ciphertext, password);
                const originalText = bytes.toString(CryptoJS.enc.Utf8);
                return originalText || null;
            } catch(e) { return null; }
        }

        // --- File System Logic ---
        function bootFileSystem() {
            const keys = Object.keys(files);
            if(keys.length === 0) createNewFile(true);
            else loadFile(keys[0]);
        }

        function createNewFile(isWelcome = false) {
            const id = 'doc_' + Date.now();
            const welcomeText = isWelcome ? `# Welcome to OmniMark Ultimate 🚀\n\nYou are in **WYSIWYG** mode. Type naturally!\n\n- Render **Math**: $E=mc^2$\n- Add tables, charts, diagrams natively.\n- Try the \`Ctrl+K\` Command Palette.` : '';
            
            files[id] = { title: 'Untitled Document', content: welcomeText, locked: false, timestamp: Date.now() };
            currentFileId = id;
            currentSessionPassword = null;
            
            DOM.docTitle.value = files[id].title;
            DOM.lockIndicator.classList.add('hidden');
            vditor.setValue(welcomeText);
            
            saveToStorage();
            renderFileList();
            updateInsights();
        }

        function loadFile(id) {
            if(!files[id]) return;
            const file = files[id];
            
            if(file.locked) {
                // Prompt for password
                pwdCallback = (pwd) => {
                    const decrypted = decrypt(file.content, pwd);
                    if(decrypted === null) {
                        DOM.pwdError.classList.remove('hidden');
                    } else {
                        currentSessionPassword = pwd;
                        executeLoad(id, file, decrypted);
                        closePwdModal();
                    }
                };
                DOM.pwdError.classList.add('hidden');
                DOM.pwdInput.value = '';
                DOM.pwdModal.classList.add('active');
                DOM.pwdInput.focus();
            } else {
                currentSessionPassword = null;
                executeLoad(id, file, file.content);
            }
        }

        function executeLoad(id, file, plaintext) {
            currentFileId = id;
            DOM.docTitle.value = file.title;
            DOM.lockIndicator.classList.toggle('hidden', !file.locked);
            vditor.setValue(plaintext || '');
            renderFileList();
            updateInsights();
        }

        function deleteFile(id, e) {
            e.stopPropagation();
            if(confirm('Delete this document permanently?')) {
                delete files[id];
                if(currentFileId === id) bootFileSystem();
                else { saveToStorage(); renderFileList(); }
            }
        }

        // Auto Save Architecture
        let saveTimeout;
        function triggerAutoSave() {
            DOM.saveStatus.innerHTML = '<i data-lucide="loader" class="w-3 h-3 animate-spin text-amber-500"></i> Saving';
            lucide.createIcons();
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(commitSave, 500);
        }

        function commitSave() {
            if(!currentFileId) return;
            files[currentFileId].title = DOM.docTitle.value;
            files[currentFileId].timestamp = Date.now();
            
            const rawContent = vditor.getValue();
            if(files[currentFileId].locked && currentSessionPassword) {
                files[currentFileId].content = encrypt(rawContent, currentSessionPassword);
            } else {
                files[currentFileId].content = rawContent;
            }
            
            saveToStorage();
            DOM.saveStatus.innerHTML = '<i data-lucide="check" class="w-3 h-3 text-emerald-500"></i> Saved';
            lucide.createIcons();
            renderFileList();
        }

        function saveToStorage() { localStorage.setItem('omni_files_v3', JSON.stringify(files)); }
        DOM.docTitle.addEventListener('input', triggerAutoSave);

        // Render Sidebar
        function renderFileList() {
            DOM.fileList.innerHTML = '';
            const sorted = Object.entries(files).sort((a,b) => b[1].timestamp - a[1].timestamp);
            
            sorted.forEach(([id, data]) => {
                const isActive = id === currentFileId;
                const dateStr = new Date(data.timestamp).toLocaleDateString();
                const lockIcon = data.locked ? `<i data-lucide="lock" class="w-3 h-3 text-rose-500"></i>` : '';
                
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg cursor-pointer flex justify-between items-center group transition ${isActive ? 'theme-accent shadow-md' : 'theme-hover border border-transparent theme-border'}`;
                div.onclick = () => loadFile(id);
                div.innerHTML = `
                    <div class="overflow-hidden flex-1">
                        <div class="font-semibold text-sm truncate flex items-center gap-2">
                            ${lockIcon} ${data.title}
                        </div>
                        <div class="text-[10px] opacity-70 mt-1">${dateStr}</div>
                    </div>
                    <button class="opacity-0 group-hover:opacity-100 text-rose-300 hover:text-white hover:bg-rose-500 p-1.5 rounded transition ml-2" onclick="deleteFile('${id}', event)">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                `;
                DOM.fileList.appendChild(div);
            });
            lucide.createIcons();
        }

        // --- File Locking / Encryption Logic ---
        let pwdCallback = null;
        function lockCurrentFile() {
            if(!currentFileId) return;
            const file = files[currentFileId];
            
            if(file.locked) {
                if(confirm("This file is encrypted. Do you want to remove the password and decrypt it permanently?")) {
                    file.locked = false;
                    currentSessionPassword = null;
                    DOM.lockIndicator.classList.add('hidden');
                    triggerAutoSave();
                    alert("File unlocked.");
                }
            } else {
                DOM.pwdError.classList.add('hidden');
                DOM.pwdInput.value = '';
                DOM.pwdModal.classList.add('active');
                DOM.pwdInput.focus();
                
                pwdCallback = (pwd) => {
                    file.locked = true;
                    currentSessionPassword = pwd;
                    DOM.lockIndicator.classList.remove('hidden');
                    triggerAutoSave();
                    closePwdModal();
                    alert("File Encrypted successfully.");
                };
            }
        }
        function closePwdModal() { DOM.pwdModal.classList.remove('active'); pwdCallback = null; }
        function submitPassword() { if(pwdCallback && DOM.pwdInput.value) pwdCallback(DOM.pwdInput.value); }
        DOM.pwdInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') submitPassword(); });

        // --- Insights ---
        function updateInsights() {
            const text = vditor.getValue();
            // Basic approximation filtering markdown artifacts
            const cleanText = text.replace(/[#*`_\[\]()]/g, ''); 
            const words = cleanText.match(/\b[-?(\w+)?]+\b/gi) ||[];
            
            DOM.statWords.innerText = words.length;
            DOM.statChars.innerText = cleanText.length;
            DOM.statTime.innerText = Math.max(1, Math.ceil(words.length / 200)) + ' min';
        }

        // --- Voice Dictation (Speech to Text) ---
        function toggleDictation() {
            if(isDictating) {
                recognition.stop();
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return alert("Speech Recognition not supported in this browser. Try Chrome/Edge.");
            
            if(!recognition) {
                recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                
                recognition.onstart = () => {
                    isDictating = true;
                    DOM.dictateOverlay.classList.remove('hidden');
                };
                recognition.onresult = (event) => {
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
                    }
                    if(finalTranscript) {
                        vditor.insertValue(finalTranscript);
                    }
                };
                recognition.onerror = (e) => console.error(e);
                recognition.onend = () => {
                    isDictating = false;
                    DOM.dictateOverlay.classList.add('hidden');
                };
            }
            recognition.start();
        }

        // --- Text to Speech ---
        function readAloud() {
            if('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Stop current
                const text = vditor.getValue().replace(/[#*`_]/g, ''); // Strip basic MD
                const msg = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(msg);
            } else { alert('TTS not supported.'); }
        }

        // --- Layout Toggles ---
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.style.display = sb.style.display === 'none' ? 'flex' : 'none';
        }
        function toggleFocusMode() { document.body.classList.toggle('focus-mode'); }

        // --- Command Palette (Omnibar) ---
        const commands =[
            { id: 't-dark', icon: 'moon', label: 'Theme: Deep Dark', action: () => setTheme('dark') },
            { id: 't-light', icon: 'sun', label: 'Theme: Clean Light', action: () => setTheme('light') },
            { id: 't-matrix', icon: 'terminal', label: 'Theme: Hacker Matrix', action: () => setTheme('matrix') },
            { id: 'f-new', icon: 'plus', label: 'File: Create New Document', action: createNewFile },
            { id: 'f-lock', icon: 'shield', label: 'Security: Encrypt / Lock Document', action: lockCurrentFile },
            { id: 'v-focus', icon: 'focus', label: 'View: Toggle Focus Mode', action: toggleFocusMode },
            { id: 'u-dictate', icon: 'mic', label: 'Utility: Start Voice Dictation', action: toggleDictation },
            { id: 'u-read', icon: 'volume-2', label: 'Utility: Read Document Aloud', action: readAloud },
            { id: 'e-html', icon: 'file-code', label: 'Export: Download HTML', action: () => vditor.exportHTML() },
            { id: 'e-md', icon: 'file-down', label: 'Export: Download Markdown', action: () => {
                const blob = new Blob([vditor.getValue()], {type: "text/markdown"});
                const a = document.createElement("a"); a.href = URL.createObjectURL(blob); 
                a.download = DOM.docTitle.value + '.md'; a.click();
            }}
        ];

        let cmdIndex = 0;
        function openCmd() {
            DOM.cmdPalette.classList.add('active');
            DOM.cmdInput.value = '';
            DOM.cmdInput.focus();
            renderCmdList('');
        }
        function closeCmd() { DOM.cmdPalette.classList.remove('active'); }

        function renderCmdList(filter) {
            DOM.cmdList.innerHTML = '';
            const filtered = commands.filter(c => c.label.toLowerCase().includes(filter.toLowerCase()));
            cmdIndex = 0;
            
            if(filtered.length === 0) {
                DOM.cmdList.innerHTML = '<div class="p-4 theme-text-muted text-center">No commands found</div>';
                return;
            }

            filtered.forEach((cmd, idx) => {
                const div = document.createElement('div');
                div.className = `cmd-item p-3 flex items-center gap-3 cursor-pointer theme-text-muted transition ${idx === cmdIndex ? 'selected' : 'theme-hover'}`;
                div.innerHTML = `<i data-lucide="${cmd.icon}" class="w-4 h-4"></i> <span>${cmd.label}</span>`;
                div.onclick = () => { cmd.action(); closeCmd(); };
                DOM.cmdList.appendChild(div);
            });
            lucide.createIcons();
        }

        DOM.cmdInput.addEventListener('input', (e) => renderCmdList(e.target.value));
        DOM.cmdInput.addEventListener('keydown', (e) => {
            const items = DOM.cmdList.querySelectorAll('.cmd-item');
            if (e.key === 'ArrowDown') { e.preventDefault(); cmdIndex = (cmdIndex + 1) % items.length; updateCmdSelection(items); }
            if (e.key === 'ArrowUp') { e.preventDefault(); cmdIndex = (cmdIndex - 1 + items.length) % items.length; updateCmdSelection(items); }
            if (e.key === 'Enter' && items[cmdIndex]) { e.preventDefault(); items[cmdIndex].click(); }
            if (e.key === 'Escape') closeCmd();
        });

        function updateCmdSelection(items) {
            items.forEach((item, idx) => {
                if(idx === cmdIndex) { item.classList.add('selected'); item.classList.remove('theme-hover'); item.scrollIntoView({block: 'nearest'}); } 
                else { item.classList.remove('selected'); item.classList.add('theme-hover'); }
            });
        }

        // Global Keybinds & Click Outsides
        window.addEventListener('keydown', (e) => {
            if((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openCmd(); }
            if(e.key === 'F11') { e.preventDefault(); toggleFocusMode(); }
        });
        DOM.cmdPalette.addEventListener('click', (e) => { if(e.target === DOM.cmdPalette) closeCmd(); });

        // Boot
        initEditor();
    </script>
</body>
</html>
