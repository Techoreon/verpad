<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Writing Pad & Code Editor Pro</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/material-darker.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/eclipse.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/foldgutter.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/lint/lint.min.css">

    <style>
        :root {
            /* Fonts */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            
            /* Light Theme Colors */
            --bg-base: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-surface-hover: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --danger-color: #ef4444;
            
            /* UI Elements */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --header-height: 60px;
            --footer-height: 40px;
        }

        body.dark-mode {
            /* Dark Theme Colors */
            --bg-base: #020617;
            --bg-surface: #0f172a;
            --bg-surface-hover: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #60a5fa;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.5);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            transition: background-color var(--transition), color var(--transition);
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-surface); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; border: 2px solid var(--bg-surface); }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Typography globally */
        button, input { font-family: inherit; }

        /* Header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: var(--header-height);
            background-color: rgba(var(--bg-surface), 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
            flex-shrink: 0;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Modern Segmented Tabs */
        .tabs, .preview-tabs {
            display: flex;
            background-color: var(--bg-base);
            padding: 4px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            gap: 4px;
        }

        .tabs button, .preview-tabs button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tabs button.active, .preview-tabs button.active {
            background-color: var(--bg-surface);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .tabs button:hover:not(.active), .preview-tabs button:hover:not(.active) {
            color: var(--text-main);
            background-color: var(--bg-surface-hover);
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--bg-surface);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .btn:hover {
            background-color: var(--bg-surface-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            color: white;
        }
        
        .btn-icon {
            font-size: 1.1rem;
        }

        input[type="file"] { display: none; }

        /* Main Workspace */
        .container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
            margin: 16px;
            border-radius: var(--radius-lg);
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .pane {
            flex-basis: 50%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-surface);
        }

        /* VS Code Style Resizer */
        .resizer {
            width: 4px;
            background-color: transparent;
            cursor: col-resize;
            position: relative;
            z-index: 10;
        }

        .resizer::after {
            content: '';
            position: absolute;
            top: 0; left: 1px; bottom: 0; width: 2px;
            background-color: var(--border-color);
            transition: background-color var(--transition);
        }

        .resizer:hover::after, .resizer:active::after {
            background-color: var(--accent-color);
        }

        /* CodeMirror Overrides */
        .CodeMirror {
            height: 100% !important;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            line-height: 1.6;
            padding: 12px 0;
            background-color: transparent !important;
        }
        
        .CodeMirror-gutters {
            background-color: var(--bg-surface) !important;
            border-right: 1px solid var(--border-color) !important;
        }

        /* Preview Pane Wrapper */
        .preview-pane-wrapper {
            flex-basis: 50%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-surface);
        }

        .preview-header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-surface);
        }

        .preview-content-area {
            flex-grow: 1;
            overflow: auto;
            padding: 32px;
            background-color: var(--bg-surface);
        }

        .preview-pane, #codeExecutionFrame {
            display: none;
            height: 100%;
            width: 100%;
            border: none;
            animation: fadeIn 0.3s ease;
        }

        .preview-pane.active, #codeExecutionFrame.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Markdown Styling - Advanced Typography */
        .preview-pane {
            color: var(--text-main);
            max-width: 800px;
            margin: 0 auto;
        }

        .preview-pane h1, .preview-pane h2, .preview-pane h3 {
            color: var(--text-main);
            font-weight: 600;
            margin-top: 2em;
            margin-bottom: 1em;
            line-height: 1.3;
        }

        .preview-pane h1 { font-size: 2.25rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.3em; margin-top: 0;}
        .preview-pane h2 { font-size: 1.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em;}
        .preview-pane p, .preview-pane ul, .preview-pane ol { margin-bottom: 1.2em; font-size: 1.05rem; color: var(--text-muted); }
        .preview-pane li { margin-bottom: 0.5em; }
        
        .preview-pane blockquote {
            border-left: 4px solid var(--accent-color);
            padding: 16px 20px;
            margin: 1.5em 0;
            background-color: var(--bg-base);
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            color: var(--text-main);
            font-style: italic;
        }

        .preview-pane code {
            background-color: var(--bg-base);
            color: var(--accent-color);
            padding: 0.2em 0.4em;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.85em;
        }

        .preview-pane pre {
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            overflow-x: auto;
            margin: 1.5em 0;
        }

        .preview-pane pre code {
            background-color: transparent;
            color: inherit;
            padding: 0;
            font-size: 0.9em;
        }

        /* Controls Bar (Footer) */
        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            height: var(--footer-height);
            background-color: var(--bg-surface);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .stats { display: flex; gap: 24px; }
        .stats span { display: flex; align-items: center; gap: 6px; }
        .stats i { font-size: 1rem; color: var(--accent-color); }
        .stat-value { color: var(--text-main); font-weight: 500; }

        .editor-actions { display: flex; gap: 12px; }
        .editor-actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color var(--transition);
            font-family: var(--font-sans);
            font-size: 0.85rem;
        }
        .editor-actions button:hover { color: var(--text-main); }
        
        .mode-display {
            background-color: var(--bg-base);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--accent-color);
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .app-header { height: auto; padding: 16px; flex-direction: column; gap: 16px; align-items: stretch; }
            .header-left, .header-right { justify-content: space-between; flex-wrap: wrap; }
            .container { flex-direction: column; margin: 0; border-radius: 0; border: none; }
            .resizer { display: none; }
            .pane, .preview-pane-wrapper { flex-basis: 50%; height: 50vh; }
            .controls-bar { flex-direction: column; height: auto; padding: 12px; gap: 12px; }
            .stats { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <div class="tabs">
                <button id="tabMarkdown" class="active"><i class="ri-markdown-fill btn-icon"></i> Markdown</button>
                <button id="tabCode"><i class="ri-code-box-fill btn-icon"></i> Code</button>
            </div>
            <div class="file-actions header-left">
                <input type="file" id="fileInput" accept=".md,.txt,.html,.js,.css">
                <button class="btn" id="openFileButton"><i class="ri-folder-open-line btn-icon"></i> Open</button>
                <button class="btn btn-primary" id="saveFileButton"><i class="ri-save-3-line btn-icon"></i> Save</button>
            </div>
        </div>
        <div class="header-right">
            <button class="btn" id="themeToggle"><i class="ri-moon-line btn-icon" id="themeIcon"></i> <span id="themeText">Dark Mode</span></button>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="container" id="mainContainer">
        <!-- Editor Pane -->
        <div id="editorPane" class="pane">
            <!-- CodeMirror mounts here -->
        </div>

        <!-- Draggable Resizer -->
        <div class="resizer" id="resizer"></div>

        <!-- Preview Pane -->
        <div id="previewWrapper" class="preview-pane-wrapper">
            <div class="preview-header">
                <div class="preview-tabs">
                    <button id="previewTabMarkdown" class="active"><i class="ri-eye-line btn-icon"></i> Preview</button>
                    <button id="previewTabRunCode"><i class="ri-play-fill btn-icon"></i> Run Output</button>
                </div>
            </div>
            <div class="preview-content-area">
                <div id="markdownPreviewPane" class="preview-pane active">
                    <!-- Markdown HTML injects here -->
                </div>
                <iframe id="codeExecutionFrame" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>
        </div>
    </div>

    <!-- Footer / Status Bar -->
    <div class="controls-bar">
        <div class="stats">
            <span><i class="ri-text"></i> Chars: <span class="stat-value" id="charCount">0</span></span>
            <span><i class="ri-file-word-2-line"></i> Words: <span class="stat-value" id="wordCount">0</span></span>
            <span><i class="ri-cursor-line"></i> <span class="stat-value" id="lineColDisplay">Ln 1, Col 1</span></span>
        </div>
        <div class="editor-actions">
            <button id="copyCodeButton"><i class="ri-clipboard-line"></i> Copy</button>
            <button id="clearEditorButton"><i class="ri-delete-bin-line"></i> Clear</button>
        </div>
        <div>
            <span class="mode-display" id="currentModeDisplay">Markdown</span>
        </div>
    </div>

    <!-- CodeMirror & Addons -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/foldcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/foldgutter.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/brace-fold.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/xml-fold.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/markdown-fold.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/fold/comment-fold.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/lint/lint.min.js"></script>

    <!-- Your existing scripts -->
    <script src="mdscript.js"></script>

    <!-- Tiny script to toggle the moon/sun icon logic alongside your existing theme logic -->
    <script>
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        // Optional UX script just to switch the icon out based on dark mode class on body
        themeBtn.addEventListener('click', () => {
            setTimeout(() => {
                if(document.body.classList.contains('dark-mode')) {
                    themeIcon.className = 'ri-sun-line btn-icon';
                    themeText.innerText = 'Light Mode';
                } else {
                    themeIcon.className = 'ri-moon-line btn-icon';
                    themeText.innerText = 'Dark Mode';
                }
            }, 10);
        });
    </script>
</body>
</html>
