<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Interactive Simulations</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background-color: #030305; overflow: hidden;
            font-family: 'Space Mono', monospace; color: #fff;
            width: 100vw; height: 100vh;
        }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

        /* UI Controls */
        .controls {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
            background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 15px 25px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            z-index: 10; width: 90%; max-width: 900px;
        }
        .btn {
            background: rgba(255,255,255,0.05); color: rgba(255, 255, 255, 0.6);
            border: 1px solid transparent; padding: 10px 18px; border-radius: 12px;
            font-family: inherit; font-size: 13px; cursor: pointer; transition: all 0.3s ease;
        }
        .btn:hover { color: #fff; background: rgba(255, 255, 255, 0.15); }
        .btn.active { color: #000; font-weight: bold; border-color: rgba(255,255,255,0.5); }

        /* Mode Colors */
        .btn.active[data-mode="1"] { background: #00f3ff; box-shadow: 0 0 20px rgba(0, 243, 255, 0.5); }
        .btn.active[data-mode="2"] { background: #ff00ea; box-shadow: 0 0 20px rgba(255, 0, 234, 0.5); }
        .btn.active[data-mode="3"] { background: #00ffaa; box-shadow: 0 0 20px rgba(0, 255, 170, 0.5); }
        .btn.active[data-mode="4"] { background: #ff5500; box-shadow: 0 0 20px rgba(255, 85, 0, 0.5); }
        .btn.active[data-mode="5"] { background: #b100ff; box-shadow: 0 0 20px rgba(177, 0, 255, 0.5); }
        .btn.active[data-mode="6"] { background: #ffe600; box-shadow: 0 0 20px rgba(255, 230, 0, 0.5); }

        .hint {
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
            font-size: 13px; color: rgba(255, 255, 255, 0.5); pointer-events: none;
            letter-spacing: 2px; text-transform: uppercase; text-align: center;
        }
    </style>
</head>
<body>

    <div class="hint" id="hint-text">Move mouse to interact</div>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <button class="btn active" data-mode="1" onclick="setMode(1)">Neural Web</button>
        <button class="btn" data-mode="2" onclick="setMode(2)">Cosmic Swarm</button>
        <button class="btn" data-mode="3" onclick="setMode(3)">Kinetic Grid</button>
        <button class="btn" data-mode="4" onclick="setMode(4)">Vector Field</button>
        <button class="btn" data-mode="5" onclick="setMode(5)">Soft Body Blob</button>
        <button class="btn" data-mode="6" onclick="setMode(6)">Fractal Matrix</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        let width, height, animationFrameId, globalTime = 0;
        
        let mouse = { x: -1000, y: -1000, vx: 0, vy: 0, isDown: false };
        let lastMouse = { x: -1000, y: -1000 };

        let currentMode = 1;
        
        // Simulation Data Stores
        let particles = [];
        let grid = [];
        let vPoints = [];
        let vSticks = [];
        let draggedPoint = null;

        // --- Setup & Input ---
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSimulation(currentMode);
        }
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            lastMouse.x = mouse.x; lastMouse.y = mouse.y;
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.vx = mouse.x - lastMouse.x; mouse.vy = mouse.y - lastMouse.y;
        });
        window.addEventListener('mousedown', () => { mouse.isDown = true; handleInteract(); });
        window.addEventListener('mouseup', () => { mouse.isDown = false; draggedPoint = null; });
        window.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; draggedPoint = null; });
        window.addEventListener('touchstart', (e) => { mouse.isDown = true; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; handleInteract(); });
        window.addEventListener('touchend', () => { mouse.isDown = false; draggedPoint = null; });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });

        // --- UI Logic ---
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.btn[data-mode="${mode}"]`).classList.add('active');
            
            const hints = {
                1: "Neural Web: Move mouse to connect • Click to repel",
                2: "Cosmic Swarm: Move mouse to attract • Click to scatter",
                3: "Kinetic Grid: Move mouse to deform elastic cloth",
                4: "Vector Field: Fluid math logic • Click to disrupt flow",
                5: "Soft Body Blob: Click and drag to throw • Watch it bounce",
                6: "Fractal Matrix: Move mouse X/Y to mutate recursion"
            };
            document.getElementById('hint-text').innerText = hints[mode];
            initSimulation(mode);
        }

        // --- Initializers ---
        function initSimulation(mode) {
            particles = []; grid = []; vPoints = []; vSticks = [];
            globalTime = 0;
            ctx.shadowBlur = 0; // Reset glows

            if (mode === 1) { // Neural Web
                let count = Math.floor((width * height) / 10000);
                for (let i=0; i<count; i++) particles.push({ x: Math.random()*width, y: Math.random()*height, vx: (Math.random()-0.5)*1.5, vy: (Math.random()-0.5)*1.5, radius: Math.random()*2+1 });
            } 
            else if (mode === 2) { // Swarm
                for (let i=0; i<1500; i++) particles.push({ x: Math.random()*width, y: Math.random()*height, vx: 0, vy: 0, hue: Math.random()*60-30 });
            }
            else if (mode === 3) { // Grid
                let spacing = 40;
                let cols = Math.floor(width / spacing) + 2; let rows = Math.floor(height / spacing) + 2;
                for (let y=0; y<rows; y++) {
                    let row = [];
                    for (let x=0; x<cols; x++) row.push({ x: x*spacing, y: y*spacing, baseX: x*spacing, baseY: y*spacing, vx: 0, vy: 0 });
                    grid.push(row);
                }
            }
            else if (mode === 4) { // Vector Field
                for (let i=0; i<3000; i++) particles.push({ x: Math.random()*width, y: Math.random()*height, vx: 0, vy: 0, color: Math.random() });
            }
            else if (mode === 5) { // Soft Body Verlet
                let cx = width/2, cy = height/2;
                let radius = Math.min(width, height) * 0.2;
                let segments = 24;
                
                // Center point
                vPoints.push({ x: cx, y: cy, oldx: cx, oldy: cy, isCenter: true });
                
                // Outer ring points
                for(let i=0; i<segments; i++) {
                    let angle = (i/segments) * Math.PI * 2;
                    let px = cx + Math.cos(angle) * radius;
                    let py = cy + Math.sin(angle) * radius;
                    vPoints.push({ x: px, y: py, oldx: px, oldy: py });
                }

                // Connect perimeter
                for(let i=1; i<=segments; i++) {
                    let next = i === segments ? 1 : i+1;
                    vSticks.push({ p1: vPoints[i], p2: vPoints[next], length: distance(vPoints[i], vPoints[next]) });
                    // Connect to center (spokes) to maintain volume
                    vSticks.push({ p1: vPoints[0], p2: vPoints[i], length: radius });
                }
                // Structural cross-bracing
                for(let i=1; i<=segments; i+=2) {
                    let next = (i+2) > segments ? ((i+2)%segments) || segments : (i+2);
                    vSticks.push({ p1: vPoints[i], p2: vPoints[next], length: distance(vPoints[i], vPoints[next]) });
                }
            }
        }

        // --- Render Loop ---
        function animate() {
            globalTime += 0.01;

            // Handle Trails vs Hard Clear
            if ([2, 4].includes(currentMode)) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'rgba(3, 3, 5, 0.15)'; // Fade effect
                ctx.fillRect(0, 0, width, height);
                ctx.globalCompositeOperation = 'lighter'; 
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = '#030305';
                ctx.fillRect(0, 0, width, height);
            }

            if (currentMode === 1) renderNeuralWeb();
            else if (currentMode === 2) renderCosmicSwarm();
            else if (currentMode === 3) renderKineticGrid();
            else if (currentMode === 4) renderVectorField();
            else if (currentMode === 5) renderVerletBlob();
            else if (currentMode === 6) renderFractal();

            animationFrameId = requestAnimationFrame(animate);
        }

        // --- Mode 1: Neural Web ---
        function renderNeuralWeb() {
            ctx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                let dx = mouse.x - p.x; let dy = mouse.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 200) {
                    let f = (200 - dist) / 200;
                    if (mouse.isDown) { p.vx -= dx*f*0.05; p.vy -= dy*f*0.05; } 
                    else { p.vx += dx*f*0.005; p.vy += dy*f*0.005; }
                }

                p.vx *= 0.98; p.vy *= 0.98;
                p.x += p.vx; p.y += p.vy;
                if (Math.abs(p.vx) < 0.1) p.vx += (Math.random()-0.5)*0.2;
                if (Math.abs(p.vy) < 0.1) p.vy += (Math.random()-0.5)*0.2;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = dist < 150 ? '#00f3ff' : 'rgba(0, 243, 255, 0.5)';
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let d = Math.sqrt(Math.pow(p.x-p2.x,2) + Math.pow(p.y-p2.y,2));
                    if (d < 100) {
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y);
                        if (dist < 150 && Math.sqrt(Math.pow(mouse.x-p2.x,2) + Math.pow(mouse.y-p2.y,2)) < 150) {
                            ctx.strokeStyle = `rgba(255, 0, 234, ${1 - d/100})`;
                        } else ctx.strokeStyle = `rgba(0, 243, 255, ${(1 - d/100) * 0.3})`;
                        ctx.stroke();
                    }
                }
            }
        }

        // --- Mode 2: Cosmic Swarm ---
        function renderCosmicSwarm() {
            let tx = mouse.x > 0 ? mouse.x : width / 2; let ty = mouse.y > 0 ? mouse.y : height / 2;
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                let dx = tx - p.x; let dy = ty - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                let force = mouse.isDown ? -200 : 80;
                
                if (dist > 0) { p.vx += (dx / dist) * (force / Math.max(dist, 10)); p.vy += (dy / dist) * (force / Math.max(dist, 10)); }
                p.vx += (Math.random() - 0.5) * 1.5; p.vy += (Math.random() - 0.5) * 1.5;
                p.vx *= 0.94; p.vy *= 0.94;
                p.x += p.vx; p.y += p.vy;

                if (p.x < 0) p.x = width; else if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height; else if (p.y > height) p.y = 0;

                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                ctx.fillStyle = `hsl(${300 + p.hue + (speed * 8)}, 100%, 60%)`;
                ctx.fillRect(p.x, p.y, 2.5, 2.5);
            }
        }

        // --- Mode 3: Kinetic Grid ---
        function renderKineticGrid() {
            ctx.strokeStyle = 'rgba(0, 255, 170, 0.5)';
            for (let y = 0; y < grid.length; y++) {
                for (let x = 0; x < grid[y].length; x++) {
                    let p = grid[y][x];
                    let dx = mouse.x - p.x; let dy = mouse.y - p.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < 150) {
                        let force = (150 - dist) / 150;
                        p.vx -= (dx / dist) * force * 3; p.vy -= (dy / dist) * force * 3;
                    }
                    p.vx += (p.baseX - p.x) * 0.08; p.vy += (p.baseY - p.y) * 0.08;
                    p.vx *= 0.8; p.vy *= 0.8;
                    p.x += p.vx; p.y += p.vy;
                }
            }
            for (let y = 0; y < grid.length; y++) {
                ctx.beginPath();
                for (let x = 0; x < grid[y].length; x++) {
                    let p = grid[y][x];
                    if (x < grid[y].length - 1) { ctx.moveTo(p.x, p.y); ctx.lineTo(grid[y][x+1].x, grid[y][x+1].y); }
                    if (y < grid.length - 1) { ctx.moveTo(p.x, p.y); ctx.lineTo(grid[y+1][x].x, grid[y+1][x].y); }
                }
                ctx.stroke();
            }
        }

        // --- Mode 4: Vector Field (Fluid Math Dynamics) ---
        function renderVectorField() {
            let scale = 0.003;
            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                
                // Composite trig function to create swirling "Perlin-like" noise
                let angle = Math.sin(p.x * scale + globalTime) + 
                            Math.cos(p.y * scale - globalTime) + 
                            Math.sin((p.x + p.y) * scale * 1.5) * Math.PI * 2;
                
                p.vx += Math.cos(angle) * 0.3;
                p.vy += Math.sin(angle) * 0.3;
                
                // Mouse disruption
                let dx = mouse.x - p.x; let dy = mouse.y - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    let f = (150 - dist) / 150;
                    if(mouse.isDown) { p.vx -= dx*f*0.1; p.vy -= dy*f*0.1; } // Repel
                    else { p.vx += dy*f*0.05; p.vy -= dx*f*0.05; } // Swirl around mouse
                }

                p.vx *= 0.95; p.vy *= 0.95;
                p.x += p.vx; p.y += p.vy;

                // Wrap around edges
                if (p.x < 0) p.x = width; else if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height; else if (p.y > height) p.y = 0;

                // Speed determines color hue (Fire/Plasma look)
                let speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                ctx.fillStyle = `hsl(${10 + speed*30 + p.color*20}, 100%, 60%)`;
                ctx.fillRect(p.x, p.y, 2, 2);
            }
        }

        // --- Mode 5: Verlet Soft Body Blob ---
        function renderVerletBlob() {
            // 1. Verlet Integration (Update positions)
            for (let p of vPoints) {
                if (p === draggedPoint) {
                    p.x = mouse.x; p.y = mouse.y;
                    p.oldx = mouse.x - mouse.vx * 0.5; // impart throwing velocity
                    p.oldy = mouse.y - mouse.vy * 0.5;
                } else {
                    let vx = (p.x - p.oldx) * 0.99; // friction
                    let vy = (p.y - p.oldy) * 0.99 + 0.5; // gravity
                    p.oldx = p.x; p.oldy = p.y;
                    p.x += vx; p.y += vy;

                    // Bounds checking with bounce
                    if (p.x < 10) { p.x = 10; p.oldx = p.x + vx * 0.8; }
                    if (p.x > width - 10) { p.x = width - 10; p.oldx = p.x + vx * 0.8; }
                    if (p.y < 10) { p.y = 10; p.oldy = p.y + vy * 0.8; }
                    if (p.y > height - 10) { p.y = height - 10; p.oldy = p.y + vy * 0.8; }
                }
            }

            // 2. Satisfy Constraints (Multiple iterations for rigidity)
            for (let iter = 0; iter < 5; iter++) {
                for (let stick of vSticks) {
                    let dx = stick.p2.x - stick.p1.x;
                    let dy = stick.p2.y - stick.p1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let diff = stick.length - dist;
                    let percent = (diff / dist) / 2;
                    let offsetX = dx * percent; let offsetY = dy * percent;

                    if (stick.p1 !== draggedPoint) { stick.p1.x -= offsetX; stick.p1.y -= offsetY; }
                    if (stick.p2 !== draggedPoint) { stick.p2.x += offsetX; stick.p2.y += offsetY; }
                }
            }

            // 3. Render Blob (Draw organic shape skipping the center point)
            ctx.beginPath();
            ctx.moveTo(vPoints[1].x, vPoints[1].y);
            for (let i = 1; i < vPoints.length; i++) {
                let next = i === vPoints.length - 1 ? 1 : i + 1;
                // Quadratic bezier for smooth blob edges
                let cx = (vPoints[i].x + vPoints[next].x) / 2;
                let cy = (vPoints[i].y + vPoints[next].y) / 2;
                ctx.quadraticCurveTo(vPoints[i].x, vPoints[i].y, cx, cy);
            }
            
            // Gradient fill
            let grad = ctx.createRadialGradient(vPoints[0].x, vPoints[0].y, 0, vPoints[0].x, vPoints[0].y, vSticks[0].length * 1.2);
            grad.addColorStop(0, "rgba(177, 0, 255, 0.8)");
            grad.addColorStop(1, "rgba(0, 243, 255, 0.4)");
            
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#b100ff';
            ctx.lineWidth = 3;
            ctx.stroke();

            // Draw center glowing eye/core
            ctx.beginPath(); ctx.arc(vPoints[0].x, vPoints[0].y, 10, 0, Math.PI*2);
            ctx.fillStyle = '#fff'; ctx.shadowBlur = 20; ctx.shadowColor = '#00f3ff'; ctx.fill(); ctx.shadowBlur = 0;
        }

        // --- Mode 6: Fractal Matrix ---
        function renderFractal() {
            ctx.save();
            ctx.translate(width / 2, height / 2);
            
            // Map mouse to fractal parameters
            let mx = mouse.x > 0 ? mouse.x : width / 2;
            let my = mouse.y > 0 ? mouse.y : height / 2;
            
            let angleOffset = (mx / width) * Math.PI; // Spread angle
            let depthBase = (my / height) * 0.5 + 0.4; // Branch length scale
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffe600';
            ctx.lineCap = 'round';
            
            // Spin slowly over time
            ctx.rotate(globalTime * 0.2);

            // Draw 4 symmetric arms
            for(let i=0; i<4; i++) {
                ctx.rotate(Math.PI / 2);
                drawBranch(0, 0, 100, 0, angleOffset, depthBase, 0);
            }
            ctx.restore();
        }

        function drawBranch(x, y, length, angle, angleOffset, scale, depth) {
            if (depth > 6) return; // Recursion limit

            let endX = x + Math.cos(angle) * length;
            let endY = y + Math.sin(angle) * length;

            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, endY);
            ctx.strokeStyle = `hsl(${50 + depth*30}, 100%, 60%)`; // Yellow to Green/Cyan
            ctx.lineWidth = 7 - depth;
            ctx.stroke();

            drawBranch(endX, endY, length * scale, angle - angleOffset, angleOffset, scale, depth + 1);
            drawBranch(endX, endY, length * scale, angle + angleOffset, angleOffset, scale, depth + 1);
        }

        // --- Utility ---
        function distance(p1, p2) { return Math.sqrt(Math.pow(p2.x-p1.x,2) + Math.pow(p2.y-p1.y,2)); }

        function handleInteract() {
            if (currentMode === 5) {
                // Find point to drag
                let minDist = 100;
                for (let p of vPoints) {
                    let d = distance(p, mouse);
                    if (d < minDist) { minDist = d; draggedPoint = p; }
                }
            }
        }

        // Boot
        resize();
        animate();

    </script>
</body>
</html>
