<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>Interactive Neural Web</title>
      <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
      <style>
         *{margin:0;padding:0;box-sizing:border-box;user-select:none}
         body{background:#030305;overflow:hidden;font-family:'Space Mono',monospace}
         canvas{display:block;width:100%;height:100%;cursor:crosshair}
         .hint{position:fixed;top:30px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase}
      </style>
      <!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-vN4FwOmZYtU6roKfPwV8s.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()
</script>

   </head>
   <body>
      <div class="hint">Neural Web: Move mouse to connect • Click to repel</div>
      <canvas id="canvas"></canvas>
      <script>
         const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d',{alpha:false});
         let width,height,particles=[];
         let mouse={x:-1000,y:-1000,vx:0,vy:0,isDown:false},lastMouse={x:-1000,y:-1000};
         function resize(){width=canvas.width=innerWidth;height=canvas.height=innerHeight;initSimulation()}
         addEventListener('resize',resize);
         addEventListener('mousemove',e=>{lastMouse.x=mouse.x;lastMouse.y=mouse.y;mouse.x=e.clientX;mouse.y=e.clientY;mouse.vx=mouse.x-lastMouse.x;mouse.vy=mouse.y-lastMouse.y});
         addEventListener('mousedown',()=>mouse.isDown=true);
         addEventListener('mouseup',()=>mouse.isDown=false);
         addEventListener('mouseleave',()=>{mouse.x=-1000;mouse.y=-1000});
         addEventListener('touchstart',e=>{mouse.isDown=true;mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY});
         addEventListener('touchmove',e=>{mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY});
         addEventListener('touchend',()=>mouse.isDown=false);
         function initSimulation(){particles=[];ctx.shadowBlur=0;let count=Math.floor(width*height/10000);for(let i=0;i<count;i++)particles.push({x:Math.random()*width,y:Math.random()*height,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,radius:Math.random()*2+1})}
         function renderNeuralWeb(){ctx.lineWidth=1;for(let i=0;i<particles.length;i++){let p=particles[i],dx=mouse.x-p.x,dy=mouse.y-p.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<200){let f=(200-dist)/200;if(mouse.isDown){p.vx-=dx*f*.05;p.vy-=dy*f*.05}else{p.vx+=dx*f*.005;p.vy+=dy*f*.005}}p.vx*=.98;p.vy*=.98;p.x+=p.vx;p.y+=p.vy;if(Math.abs(p.vx)<.1)p.vx+=(Math.random()-.5)*.2;if(Math.abs(p.vy)<.1)p.vy+=(Math.random()-.5)*.2;if(p.x<0||p.x>width)p.vx*=-1;if(p.y<0||p.y>height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fillStyle=dist<150?'#00f3ff':'rgba(0,243,255,.5)';ctx.fill();for(let j=i+1;j<particles.length;j++){let p2=particles[j],d=Math.hypot(p.x-p2.x,p.y-p2.y);if(d<100){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p2.x,p2.y);if(dist<150&&Math.hypot(mouse.x-p2.x,mouse.y-p2.y)<150)ctx.strokeStyle=`rgba(255,0,234,${1-d/100})`;else ctx.strokeStyle=`rgba(0,243,255,${(1-d/100)*.3})`;ctx.stroke()}}}}
         function animate(){ctx.fillStyle="#030305";ctx.fillRect(0,0,width,height);renderNeuralWeb();requestAnimationFrame(animate)}
         resize();animate();
      </script>
   </body>
</html>
