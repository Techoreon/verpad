<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Markdown Table Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#151e2e',
                            900: '#0f172a',
                            950: '#020617',
                        },
                        primary: {
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'ui-monospace', 'SFMono-Regular', 'monospace'],
                    },
                    transitionProperty: {
                        'colors-shadow': 'background-color, border-color, color, fill, stroke, box-shadow',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

        body {
            background-color: #020617; /* slate-950 */
            color: #cbd5e1; /* slate-300 */
        }

        /* Custom Scrollbar for a premium feel */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }

        /* Table Input Transitions */
        table input {
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        
        /* Cell Focus Rings */
        td:focus-within, th:focus-within {
            position: relative;
            z-index: 10;
        }
        td:focus-within::after, th:focus-within::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid #3b82f6; /* primary-500 */
            pointer-events: none;
            border-radius: 2px;
        }

        /* Toast Animation */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px) translateX(-50%); }
            to { opacity: 1; transform: translateY(0) translateX(-50%); }
        }
        .toast-show {
            animation: slideUpFade 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8 font-sans antialiased selection:bg-primary-500 selection:text-white">

    <div class="max-w-6xl w-full mx-auto flex flex-col gap-6 flex-grow">
        
        <!-- Header -->
        <header class="text-center mb-2">
            <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight mb-3">Markdown Table Generator</h1>
            <p class="text-slate-400">Edit the visual table below. Perfectly padded Markdown is generated in real-time.</p>
        </header>

        <!-- Main Workspace -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            
            <!-- Toolbar -->
            <div class="bg-slate-850 border-b border-slate-800 p-4 flex flex-wrap items-center justify-between gap-4">
                <div class="flex items-center gap-2">
                    <button onclick="addRow()" class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Add Row
                    </button>
                    <button onclick="addColumn()" class="inline-flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        <svg class="w-4 h-4 text-primary-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Add Column
                    </button>
                </div>
                
                <div class="flex items-center gap-2">
                    <button onclick="removeRow()" class="inline-flex items-center gap-2 bg-slate-900 hover:bg-red-900/30 text-slate-400 hover:text-red-400 border border-slate-800 hover:border-red-900/50 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                        Remove Row
                    </button>
                    <button onclick="removeColumn()" class="inline-flex items-center gap-2 bg-slate-900 hover:bg-red-900/30 text-slate-400 hover:text-red-400 border border-slate-800 hover:border-red-900/50 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                        Remove Column
                    </button>
                </div>
            </div>

            <!-- Visual Table Editor -->
            <div class="overflow-x-auto p-6 bg-[#0B1120]">
                <table id="mdTable" class="w-full border-collapse min-w-max">
                    <thead id="tableHead">
                        <!-- Header injected via JS -->
                    </thead>
                    <tbody id="tableBody">
                        <!-- Body injected via JS -->
                    </tbody>
                </table>
            </div>

            <!-- Output Area -->
            <div class="border-t border-slate-800 bg-slate-900 flex flex-col">
                <div class="flex items-center justify-between px-6 py-3 border-b border-slate-800 bg-slate-850">
                    <div class="flex items-center gap-2 text-slate-300 font-semibold">
                        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                        Generated Markdown
                    </div>
                    <button onclick="copyToClipboard()" class="inline-flex items-center gap-2 bg-primary-600 hover:bg-primary-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-primary-500/20">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy to Clipboard
                    </button>
                </div>
                <textarea id="mdOutput" readonly class="w-full h-64 p-6 bg-slate-900 text-slate-300 font-mono text-sm resize-y focus:outline-none whitespace-pre overflow-auto" placeholder="Markdown will appear here..."></textarea>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-slate-800 border border-slate-700 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 opacity-0 pointer-events-none transition-opacity duration-300 z-50">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span class="font-medium">Copied to clipboard!</span>
    </div>

    <script>
        // DOM Elements
        const tableHead = document.getElementById('tableHead');
        const tableBody = document.getElementById('tableBody');
        const mdOutput = document.getElementById('mdOutput');
        const mdTable = document.getElementById('mdTable');

        // State
        let rowCount = 3;
        let colCount = 3;

        // Initialize Application
        function init() {
            buildTable();
            // Event delegation for input events to trigger real-time updates
            mdTable.addEventListener('input', updateMarkdown);
        }

        // Build the initial HTML Table
        function buildTable() {
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            // Header Row
            const trHead = document.createElement('tr');
            for (let c = 0; c < colCount; c++) {
                trHead.appendChild(createCell('th', c + 1));
            }
            tableHead.appendChild(trHead);

            // Data Rows
            for (let r = 0; r < rowCount; r++) {
                const tr = document.createElement('tr');
                for (let c = 0; c < colCount; c++) {
                    tr.appendChild(createCell('td'));
                }
                tableBody.appendChild(tr);
            }

            updateMarkdown();
        }

        // Helper to create a table cell containing an input
        function createCell(type, headerIndex = null) {
            const cell = document.createElement(type);
            const isHeader = type === 'th';
            
            // Apply sleek dark mode borders and backgrounds
            cell.className = `border border-slate-700 bg-slate-800/50 hover:bg-slate-800 transition-colors relative`;
            
            const input = document.createElement('input');
            input.type = 'text';
            // Inputs are transparent and fill the whole cell space
            input.className = `w-full h-full min-w-[120px] bg-transparent outline-none py-3 px-4 text-sm ${isHeader ? 'text-white font-semibold placeholder-slate-500' : 'text-slate-300 placeholder-slate-600'}`;
            
            if (isHeader) {
                input.value = `Header ${headerIndex}`;
            } else {
                input.placeholder = '...';
            }

            cell.appendChild(input);
            return cell;
        }

        // Add a new row to the body
        function addRow() {
            const tr = document.createElement('tr');
            for (let c = 0; c < colCount; c++) {
                tr.appendChild(createCell('td'));
            }
            tableBody.appendChild(tr);
            rowCount++;
            updateMarkdown();
        }

        // Remove the last row from the body
        function removeRow() {
            if (rowCount > 0) {
                tableBody.removeChild(tableBody.lastElementChild);
                rowCount--;
                updateMarkdown();
            }
        }

        // Add a new column to head and body
        function addColumn() {
            colCount++;
            
            // Add to Header
            const trHead = tableHead.querySelector('tr');
            trHead.appendChild(createCell('th', colCount));

            // Add to Body
            const rows = tableBody.querySelectorAll('tr');
            rows.forEach(tr => {
                tr.appendChild(createCell('td'));
            });

            updateMarkdown();
        }

        // Remove the last column from head and body
        function removeColumn() {
            if (colCount > 1) { // Keep at least 1 column
                colCount--;
                
                // Remove from Header
                const trHead = tableHead.querySelector('tr');
                trHead.removeChild(trHead.lastElementChild);

                // Remove from Body
                const rows = tableBody.querySelectorAll('tr');
                rows.forEach(tr => {
                    tr.removeChild(tr.lastElementChild);
                });

                updateMarkdown();
            }
        }

        // Core logic: Parse DOM table and generate perfectly aligned Markdown
        function updateMarkdown() {
            // 1. Extract raw data from the DOM
            const rows = Array.from(mdTable.querySelectorAll('tr'));
            const data = rows.map(row => {
                const inputs = Array.from(row.querySelectorAll('input'));
                // Markdown uses | for columns, so we must escape user-typed pipes
                return inputs.map(input => input.value.trim().replace(/\|/g, '\\|'));
            });

            if (data.length === 0 || data[0].length === 0) {
                mdOutput.value = '';
                return;
            }

            // 2. Calculate the maximum width of each column (minimum 3 characters for the '---')
            const colWidths = new Array(colCount).fill(3);
            data.forEach(row => {
                row.forEach((cell, i) => {
                    if (cell.length > colWidths[i]) {
                        colWidths[i] = cell.length;
                    }
                });
            });

            let mdString = '';

            // 3. Build Markdown Head
            const headerData = data[0];
            mdString += '| ' + headerData.map((cell, i) => cell.padEnd(colWidths[i])).join(' | ') + ' |\n';

            // 4. Build Markdown Separator (---)
            mdString += '| ' + colWidths.map(w => '-'.repeat(w)).join(' | ') + ' |\n';

            // 5. Build Markdown Body
            for (let i = 1; i < data.length; i++) {
                const rowData = data[i];
                mdString += '| ' + rowData.map((cell, j) => cell.padEnd(colWidths[j])).join(' | ') + ' |\n';
            }

            // 6. Update Output
            mdOutput.value = mdString;
        }

        // Copy generated Markdown to Clipboard with visually smooth Toast
        function copyToClipboard() {
            if (!mdOutput.value) return;
            
            navigator.clipboard.writeText(mdOutput.value).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.remove('opacity-0');
                toast.classList.add('toast-show');
                
                setTimeout(() => {
                    toast.classList.remove('toast-show');
                    toast.classList.add('opacity-0');
                }, 3000);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        // Boot the app
        init();
    </script>
</body>
</html>
